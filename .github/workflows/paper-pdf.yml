name: paper-pdf

# Builds paper/main.pdf and commits it back to the repo so the
# Download-PDF button on the live site can link to the raw GitHub URL.
# Also uploads it as a workflow artifact (one-click download from the
# Actions UI) and attaches it to a release on tag pushes.
#
# Triggers:
#   - push to main that touches paper/** or this workflow file
#   - tag push (so each release has a paper attached)
#   - manual dispatch from the Actions tab

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Note: no `paths:` filter on purpose. A `paths:` filter would also apply
# to tag pushes, which would skip the release-attach step whenever a tag
# happens to land on a commit that did not touch `paper/**`. The build is
# ~2 minutes; running it on every main push is the simpler, never-misses
# choice. The commit-back step is idempotent (the diff is empty when
# nothing changed) so this does not generate noise commits.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Need full history so the commit-back step can push without
          # the shallow-clone restriction.
          fetch-depth: 0

      - name: Install TeX Live (minimal set)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            texlive-science \
            lmodern \
            biber

      - name: Build paper
        working-directory: paper
        run: |
          # Force a from-scratch build. `make` alone keys off file mtimes,
          # and a fresh git checkout sets mtimes nondeterministically: when
          # the committed main.pdf lands newer than main.tex, `make` treats
          # the PDF as up-to-date and does nothing, leaving a stale PDF
          # committed back. `make clean` removes the artifacts so the PDF is
          # always rebuilt from the current source.
          make clean
          make
          ls -la main.pdf

      - name: Upload PDF + arXiv bundle inputs as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-main-pdf
          path: |
            paper/main.pdf
            paper/main.bbl
          retention-days: 90

      - name: Build arXiv bundle (main.tex + main.bbl)
        working-directory: paper
        run: |
          make arxiv
          ls -la arxiv-submission.tar.gz
          tar tzf arxiv-submission.tar.gz

      - name: Upload arXiv bundle as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-arxiv-bundle
          path: paper/arxiv-submission.tar.gz
          retention-days: 90

      - name: Commit PDF and .bbl back to paper/
        # Only commit-back when the built ref IS main. A workflow_dispatch on a
        # feature branch must NOT push that branch's PDF to main (it would
        # either be rejected, as happened, or silently fast-forward main to the
        # branch tip). On a manual dispatch on main, github.ref is still
        # refs/heads/main, so the intended case keeps working.
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "paper-pdf-bot"
          git config user.email "noreply@github.com"
          git add paper/main.pdf paper/main.bbl
          if git diff --cached --quiet; then
            echo "No paper changes to commit."
          else
            git commit -m "ci(paper): rebuild main.pdf and main.bbl [skip ci]"
            git push origin HEAD:main
          fi

      - name: Attach PDF and arXiv bundle to release if this is a tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            paper/main.pdf
            paper/arxiv-submission.tar.gz
          fail_on_unmatched_files: false
