name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Primary matrix: dev + learned extras (torch CPU). Verifies the full
  # contract claim, including the learned-MLP adapter, on every supported
  # Python.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev + learned deps
        # torch CPU is universal: it has prebuilt wheels for every matrix
        # entry. The 'control' extra (dm-control + mujoco + labmaze)
        # currently has no Python 3.13 wheels; labmaze tries to build from
        # source via Bazel and fails on 3.13 with a missing bazel_skylib
        # repo. We install [control] in a separate, conditional step below.
        run: |
          python -m pip install --upgrade pip
          # Install torch from the official CPU-only index to avoid pulling
          # CUDA wheels (~2 GB) on runners that do not have a GPU.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,learned]"

      - name: Install control deps (Python 3.11 / 3.12 only)
        # dm-control has prebuilt wheels for 3.11 and 3.12 but pulls
        # labmaze which fails to build from source on 3.13 (upstream
        # Bazel-skylib issue, not ours). The DMC test in
        # tests/test_dmc_acrobot.py uses pytest.importorskip so it
        # silently skips on 3.13.
        if: matrix.python-version != '3.13'
        run: pip install -e ".[control]"

      - name: Run test suite
        run: pytest -q

      - name: Smoke-test toy and learned examples
        run: |
          python -m examples.two_room_toy.run_baseline > /dev/null
          python -m examples.maze_toy.run_baseline > /dev/null
          python -m examples.maze_toy.run_horizon_sweep > /dev/null
          python -m examples.maze_toy.run_learned_baseline > /dev/null

      - name: Smoke-test DMC Acrobot baseline (Python 3.11 / 3.12 only)
        if: matrix.python-version != '3.13'
        run: python -m experiments.dmc_acrobot.baseline > /dev/null

      - name: Smoke-test learned MLP world model on DMC Acrobot (Python 3.11 / 3.12 only)
        # --smoke uses 5 train rollouts x 80 steps, 30 epochs, 2 benchmark
        # episodes x 80 steps. ~5 s wall-clock on a runner. Locks in the
        # full pipeline: random rollouts -> train -> plug into the planner
        # -> generate a scorecard JSON. The 'full' run that produced the
        # canonical results/dmc_acrobot/learned_random_rollouts.json takes
        # ~2-5 min and is not appropriate for CI.
        if: matrix.python-version != '3.13'
        run: python -m experiments.dmc_acrobot.learned_baseline --smoke > /dev/null

  # Stdlib-only job: installs only the [dev] extra, never torch. Locks in
  # the promise that the core runtime stays import-clean without PyTorch.
  # The learned tests skip themselves via pytest.importorskip("torch"), so
  # a green run here means: (a) the core package imports without torch,
  # (b) the non-learned examples run without torch, and (c) no future
  # change accidentally pulls torch into a non-learned import path.
  test-stdlib-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev only (no torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify torch is NOT importable
        run: |
          python -c "import sys; \
          import importlib.util; \
          spec = importlib.util.find_spec('torch'); \
          sys.exit(0 if spec is None else f'torch unexpectedly installed at {spec.origin}')"

      - name: Run test suite (learned tests skip themselves)
        run: pytest -q

      - name: Smoke-test stdlib-only examples
        run: |
          python -m examples.two_room_toy.run_baseline > /dev/null
          python -m examples.maze_toy.run_baseline > /dev/null
          python -m examples.maze_toy.run_horizon_sweep > /dev/null
