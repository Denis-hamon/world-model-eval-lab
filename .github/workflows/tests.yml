name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev + learned deps
        # The 'learned' extra pulls torch, which adds ~150-200 MB and a
        # one-time install cost of roughly 30-60 s per matrix entry on a
        # cache miss. The pip cache (configured on the setup-python step)
        # absorbs that on subsequent runs. We take the hit on every matrix
        # entry because the headline contract claim - that any dynamics
        # callable, stdlib or learned, plugs into the same evaluation layer
        # - is only verified end-to-end when the learned tests and the
        # learned smoke baseline both pass on every supported Python.
        run: |
          python -m pip install --upgrade pip
          # Install torch from the official CPU-only index to avoid pulling
          # CUDA wheels (~2 GB) on runners that do not have a GPU.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,learned]"

      - name: Run test suite
        run: pytest -q

      - name: Smoke-test runnable examples
        run: |
          python -m examples.two_room_toy.run_baseline > /dev/null
          python -m examples.maze_toy.run_baseline > /dev/null
          python -m examples.maze_toy.run_horizon_sweep > /dev/null
          python -m examples.maze_toy.run_learned_baseline > /dev/null
