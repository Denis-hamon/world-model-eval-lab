title: World Model Evaluation Lab
description: A decision-oriented benchmark framework for evaluating action-conditioned world models beyond static AI benchmarks.
theme: jekyll-theme-cayman
show_downloads: false
google_analytics:
include:
  - assets
exclude:
  - "*.json"

# Apply the custom default layout to every doc page, not just index.md.
defaults:
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-seo-tag

# Disable kramdown's own math handling so MathJax can scan the raw $...$ and
# $$...$$ delimiters client-side without colliding with the kramdown engine.
kramdown:
  math_engine: null
